<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--paper); overflow-x: hidden; }
  /* Smooth anchor scrolling */
  html { scroll-behavior: smooth; }
  /* Selection */
  ::selection { background: var(--ink); color: var(--paper); }
  /* Subtle reveal on load */
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  main > section { animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
  main > section:nth-child(1) { animation-delay: 0.05s; }
  main > section:nth-child(2) { animation-delay: 0.15s; }
  main > section:nth-child(3) { animation-delay: 0.2s; }
  main > section:nth-child(4) { animation-delay: 0.25s; }
</style>
</head>
